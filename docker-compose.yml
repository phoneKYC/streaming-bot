version: '3.8'

services:
  streaming-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-bot
    image: streaming-bot:hardened

    # Environment variables - read from .env file
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/stream_manager.db

    # Volumes for persistent data
    volumes:
      - ./data:/app/data

    # Restart policy - only on failure, not on healthy=False loops
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging - bounded size to prevent disk overflow
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Real health check - uses the Python healthcheck.py script
    # (matches the one in Dockerfile; keeps docker-compose standalone-runnable)
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false  # /app/data needs write access
    cap_drop:
      - ALL
    cap_add:
      - SETUID   # needed for ffmpeg subprocess management
      - SETGID

# Networks
networks:
  default:
    name: streaming-network

# Volumes
volumes:
  data:
    driver: local
